<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SourceMap Loader</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <div class="header-left">
          <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/>
          </svg>
          <h1>SourceMap Loader</h1>
        </div>
        <div class="header-right">
          <span id="status-badge" class="badge badge--detached">Detached</span>
          <button id="toggle-btn" class="btn btn--primary">Attach</button>
          <button id="clear-btn" class="btn btn--ghost">Clear</button>
        </div>
      </header>

      <div id="toolbar">
        <input id="filter-input" type="text" placeholder="Filter by URL…" spellcheck="false" />
        <div class="toolbar-right">
          <label class="toggle-label">
            <input type="checkbox" id="auto-scroll" checked />
            <span>Auto-scroll</span>
          </label>
          <span id="count-label">0 scripts</span>
        </div>
      </div>

      <div id="table-wrap">
        <table id="scripts-table">
          <thead>
            <tr>
              <th class="col-status">Status</th>
              <th class="col-url">Script URL</th>
              <th class="col-map">Source Map</th>
              <th class="col-actions">Actions</th>
            </tr>
          </thead>
          <tbody id="scripts-tbody">
            <tr id="empty-row">
              <td colspan="4">
                <div class="empty-state">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 8v4M12 16h.01"/>
                  </svg>
                  <p>Attach to a tab and reload the page<br/>to start detecting JS bundles.</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div id="log-panel">
        <div class="log-header">
          <span>Log</span>
          <button id="clear-log-btn" class="btn btn--ghost btn--xs">Clear log</button>
        </div>
        <div id="log-output"></div>
      </div>
    </div>
    <script src="panel.js"></script>
  </body>
</html>
